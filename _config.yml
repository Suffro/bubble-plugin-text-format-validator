name: bubble-plugin-text-format-validator
title: Text Format Validator for Bubble.io

description: >- # this means to ignore newlines until "baseurl:"
  Validate 25+ text formats in your Bubble.io app like hex color, emails, phones, IBANs, dates etc. Powered by validator.js, the industry-standard validation library.
  
baseurl: "/" # the subpath of your site, e.g. /blog
url: "https://suffro.github.io/bubble-plugin-text-format-validator" # the base hostname & protocol for your site, e.g. http://example.com

# Jeckyll theme
theme: jekyll-theme-minima

