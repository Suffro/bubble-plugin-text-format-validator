name: bubble-plugin-text-format-validator
title: Text Format Validator Guide

description: >- # this means to ignore newlines until "baseurl:"
  Complete data validation for your Bubble.io apps, powered by validator.js — the most popular string validation library on npm (200M+ downloads). One flexible action with 29 validation formats ready to use as email, URL, phone number, IBAN, credit card, VAT number, password strength, postal code, dates, UUID, JSON and many more. Available both **client-side** (instant feedback, zero workload) and **server-side** (direct return values, secure pre-database validation). Every validation is configurable through options and locale — native support for international formats. Stop reinventing the wheel with fragile regex, use the industry standard.
  
baseurl: "/" # the subpath of your site, e.g. /blog
url: "https://suffro.github.io/bubble-plugin-text-format-validator" # the base hostname & protocol for your site, e.g. http://example.com

# Jeckyll theme
theme: jekyll-theme-architect

